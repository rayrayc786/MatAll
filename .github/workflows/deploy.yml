name: Deploy to VPS

on:
  push:
    branches:
      - main
      - newUI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 195.35.21.157
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/MatAll
            
            # Load NVM and Profile to ensure npm/node/pm2 are in PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            source ~/.bashrc || source ~/.profile || true

            # Reset to origin to avoid local conflict issues
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            # Backend
            cd Backend
            npm install
            pm2 delete matall-backend || true
            pm2 start server.js --name "matall-backend"
            pm2 save

            # Frontend
            cd ../frontend
            npm install
            npm run build

            # Clean + copy to Nginx root
            rm -rf /var/www/html/*
            cp -r dist/* /var/www/html/

            # Restart nginx
            sudo systemctl restart nginx