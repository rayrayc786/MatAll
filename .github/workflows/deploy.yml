name: Deploy to VPS

on:
  push:
    branches:
      - main
      - newUI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 195.35.21.157
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/MatAll
            
            # Load NVM and Profile to ensure npm/node/pm2 are in PATH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            source ~/.bashrc || source ~/.profile || true

            # Reset to origin to avoid local conflict issues
            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            # Backend
            cd Backend
            npm install
            
            # Use reload for zero-downtime; it will fall back to start if process isn't running
            pm2 reload matall-backend --update-env || pm2 start server.js --name "matall-backend"
            pm2 save
            
            # Verify status
            pm2 list

            # Frontend
            cd ../frontend
            # Fresh install to avoid dependency issues with the new PWA plugin
            rm -rf node_modules package-lock.json
            npm install --include=dev
            
            # Build the PWA
            npm run build

            # Only update live folder if build succeeded
            if [ -d "dist" ]; then
              rm -rf /var/www/html/*
              cp -r dist/* /var/www/html/
              # Restart Nginx to pick up new SPA routing/PWA assets
              sudo systemctl restart nginx
            else
              echo "Build failed - dist folder not found. Skipping copy."
              exit 1
            fi